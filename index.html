const API_PENDING = new Map();

function isTrustedApiOrigin(origin){
  return origin==='https://script.google.com' ||
    /^https:\/\/(?:[a-z0-9-]+\.)*googleusercontent\.com$/i.test(origin) ||
    /^http:\/\/(localhost|127\.0\.0\.1)(?::\d+)?$/i.test(origin);
}

window.addEventListener('message', event => {
  const data = event.data || {};
  if(data.channel !== 'ZF_ERP_API' || data.type !== 'RESPONSE' || !data.requestId) return;

  // نتحقق أولاً من وجود طلب معلّق يحمل المعرف نفسه.
  // بعض متصفحات الهاتف تعيد origin بالقيمة "null" لصفحات Apps Script داخل iframe.
  const pending = API_PENDING.get(data.requestId);
  if(!pending) return;
  if(event.origin !== 'null' && !isTrustedApiOrigin(event.origin)) return;

  clearTimeout(pending.timer);
  API_PENDING.delete(data.requestId);
  pending.cleanup();
  pending.resolve(data.result || {ok:false,message:'لم يرجع الخادم أي بيانات.'});
});

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('loginError').classList.add('hidden');
  setLoading(true);
  try {
    const res = await server('login',{email:val('loginEmail'),password:val('loginPassword')});
    if(!res || !res.ok){
      showLoginError((res && res.message) || 'تعذر تسجيل الدخول.');
      return;
    }
    STATE.token=res.token;
    localStorage.setItem('zf_erp_token',res.token);
    await startApp();
  } catch(err) {
    console.error('LOGIN ERROR:',err);
    localStorage.removeItem('zf_erp_token');
    STATE.token='';
    showLoginError('خطأ تسجيل الدخول: '+(err.message || String(err)));
  } finally {
    setLoading(false);
  }
});

window.addEventListener('load', async ()=>{
  const info=document.getElementById('connectionInfo');
  if(!String(CONFIG.GAS_WEB_APP_URL||'').includes('/exec')){
    if(info) info.textContent='الخادم غير مضبوط: ألصق رابط /exec داخل GAS_WEB_APP_URL.';
    showLoginError('الإعداد الأول: ألصق رابط Apps Script المنشور داخل GAS_WEB_APP_URL في index.html.');
    return;
  }

  const ping=await server('ping',{});
  if(ping && ping.ok){
    if(info) info.textContent='✓ الخادم متصل — '+(ping.version||'Apps Script');
  }else{
    if(info) info.textContent='✕ تعذر الاتصال بالخادم';
    showLoginError((ping&&ping.message) || 'تعذر الاتصال. تأكد من رابط /exec وإعداد النشر Anyone.');
    return;
  }

  if(STATE.token) startApp();
});

async function startApp(){
  setLoading(true);
  try{
    const res=await server('bootstrap',{token:STATE.token});

    if(!res || !res.ok){
      throw new Error((res && res.message) || 'تعذر تحميل بيانات النظام.');
    }

    if(!res.user || !res.settings || !res.dashboard || !res.dashboard.cards){
      throw new Error('استجابة النظام ناقصة. شغّل setupERP ثم أعد نشر التطبيق.');
    }

    STATE.boot=res;
    STATE.boot.settings=Object.assign({},DEFAULT_COMPANY,res.settings||{});
    const rates=(STATE.boot.settings.tvaRates||[0,9,19]).map(String);
    ENUMS.INVOICES.TaxRate=rates.map(v=>[v,v+'%']);
    const branchIds=(STATE.boot.lookups.BRANCHES||[]).map(b=>String(b.ID));
    if(STATE.boot.user.BranchID) STATE.branchId=STATE.boot.user.BranchID;
    else if(STATE.branchId&&!branchIds.includes(String(STATE.branchId))) STATE.branchId='';

    document.getElementById('companyName').textContent=STATE.boot.settings.companyName || 'ZF ERP';
    document.getElementById('userName').textContent=res.user.Name || res.user.Email || 'مستخدم';
    document.getElementById('userRole').textContent=res.user.RoleName || res.user.Role || '';
    document.getElementById('avatar').textContent=(res.user.Name || 'م').slice(0,1);
    applyCompanyBranding();
    setupBranchFilter();

    buildNav();
    if(STATE.branchId){
      const filtered=await server('dashboard',{token:STATE.token,branchId:STATE.branchId});
      showDashboard(filtered&&filtered.ok?filtered:res.dashboard);
    }else showDashboard(res.dashboard);

    // لا نخفي صفحة الدخول إلا بعد نجاح رسم لوحة القيادة.
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('appView').classList.remove('hidden');
    document.getElementById('loginError').classList.add('hidden');
  }catch(err){
    console.error('START APP ERROR:',err);
    localStorage.removeItem('zf_erp_token');
    STATE.token='';
    STATE.boot=null;
    document.getElementById('appView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
    showLoginError('خطأ تحميل النظام: '+(err.message || String(err)));
  }finally{
    setLoading(false);
  }
}

function applyCompanyBranding(){
  const cfg=STATE.boot?.settings||DEFAULT_COMPANY;
  document.querySelectorAll('.company-logo').forEach(img=>{if(img&&cfg.logoUrl)img.src=cfg.logoUrl});
  document.title=(cfg.companyName||'ATIA BELGACEM')+' ERP';
}

function setupBranchFilter(){
  const wrap=document.getElementById('branchFilterWrap'),select=document.getElementById('branchFilter');
  const branches=STATE.boot?.lookups?.BRANCHES||[];
  if(!branches.length){wrap.classList.add('hidden');return}
  const canAll=['GENERAL_MANAGER','FINANCE_MANAGER'].includes(STATE.boot.user.Role);
  select.innerHTML=(canAll?'<option value="">كل الفروع</option>':'')+branches.map(b=>`<option value="${escAttr(b.ID)}" ${String(STATE.branchId)===String(b.ID)?'selected':''}>${esc(b.Name||b.ID)}</option>`).join('');
  if(!canAll&&STATE.boot.user.BranchID){select.value=STATE.boot.user.BranchID;STATE.branchId=STATE.boot.user.BranchID}
  wrap.classList.toggle('hidden',branches.length<2&&!canAll);
}

async function changeBranchFilter(value){
  STATE.branchId=value||'';
  localStorage.setItem('zf_erp_branch',STATE.branchId);
  // تغيير الفرع فقط هو الذي يطلب بيانات جديدة؛ لا يوجد تحديث تلقائي دوري.
  if(STATE.view==='annualReports') await showAnnualReports();
  else if(STATE.entity) await loadEntity({force:false});
  else await refreshDashboard();
}

function buildNav(){
  const nav=document.getElementById('nav');
  const canViewZakat=STATE.boot?.user?.Role==='GENERAL_MANAGER';
  const annualLabel=canViewZakat?'التقارير السنوية والزكاة':'التقارير السنوية';
  const groups=[
    ['الرئيسية',[['dashboard','لوحة القيادة','📊'],['annualReports',annualLabel,'📅']]],
    ['العمليات',['PROJECTS','BRANCHES','PURCHASE_REQUESTS','PURCHASE_ORDERS','WAREHOUSES','MATERIALS','STOCK_MOVEMENTS']],
    ['المالية',['SUPPLIERS','CLIENTS','BANKS','BANK_TRANSACTIONS','CASH_TRANSACTIONS','INVOICES','PAYMENTS','JOURNAL']],
    ['الموارد',['WORKERS','EQUIPMENT','USERS','NOTIFICATIONS']]
  ];
  let html='';
  groups.forEach(([title,items])=>{
    const visible=items.filter(x=>Array.isArray(x)?(x[0]!=='annualReports'||STATE.boot.entities.includes('INVOICES')):STATE.boot.entities.includes(x));
    if(!visible.length)return;
    html+=`<div class="sep">${title}</div>`;
    visible.forEach(item=>{
      if(Array.isArray(item)){const fn=item[0]==='annualReports'?'showAnnualReports()':'showDashboard()';html+=`<button data-view="${item[0]}" onclick="${fn}"><span>${item[2]}</span>${item[1]}</button>`;}
      else {const m=ENTITY_META[item]||{label:item,icon:'•'};html+=`<button data-view="${item}" onclick="openEntity('${item}')"><span>${m.icon}</span>${m.label}</button>`}
    });
  });
  nav.innerHTML=html;
}

function setActiveNav(view){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  document.getElementById('sidebar').classList.remove('open');

function renderMap(projects){
  const pins=projects.filter(p=>p.Latitude&&p.Longitude).slice(0,15).map((p,i)=>{
    const x=12+((Math.abs(Number(p.Longitude))*17+i*13)%76),y=15+((Math.abs(Number(p.Latitude))*11+i*19)%68);
    const url=`https://www.google.com/maps?q=${encodeURIComponent(p.Latitude+','+p.Longitude)}`;
    return `<a class="map-pin" style="left:${x}%;top:${y}%" href="${url}" target="_blank" title="${esc(p.Name)}"><span>${i+1}</span></a>`;
  }).join('');
  return `<div class="map-box"><div class="map-grid"></div>${pins}<div class="map-note">اضغط على العلامة لفتح الموقع في Google Maps</div></div>`;
}

function applyEntitySearch(){
  const q=(document.getElementById('entitySearch')?.value||'').trim().toLowerCase();
  STATE.rows=q
    ? STATE.allRows.filter(r=>Object.values(r).some(v=>display(v,'',r).toLowerCase().includes(q)))
    : STATE.allRows.slice();
  renderTable(STATE.headers,STATE.rows);
}

async function loadEntity(options={}){
  const entity=STATE.entity;
  if(!entity)return;
  const force=options.force===true;
  const key=entityCacheKey(entity);
  const cached=STATE.entityCache[key];

  if(cached&&!force){
    STATE.headers=cached.headers.slice();
    STATE.allRows=cached.rows.map(r=>Object.assign({},r));
    applyEntitySearch();
    return;
  }

  const sequence=++STATE.loadSequence;
  const area=document.getElementById('tableArea');
  if(area&&!cached)area.innerHTML='<div class="empty">جاري تحميل البيانات...</div>';
  const r=await server('list',{token:STATE.token,entity,search:'',pageSize:500,branchId:STATE.branchId});

  // تجاهل أي استجابة قديمة إذا انتقل المستخدم إلى صفحة أخرى أثناء التحميل.
  if(sequence!==STATE.loadSequence||STATE.entity!==entity)return;
  if(!r.ok){toast(r.message,true);return}

  STATE.headers=(r.headers||[]).slice();
  STATE.allRows=(r.rows||[]).map(row=>Object.assign({},row));
  STATE.entityCache[key]={headers:STATE.headers.slice(),rows:STATE.allRows.map(row=>Object.assign({},row)),total:r.total||STATE.allRows.length};
  applyEntitySearch();
}

function renderTable(headers,rows){
  const entity=STATE.entity;
  const useful=(ENTITY_FIELDS[entity]||headers).filter(h=>!['PasswordHash','ItemsJSON'].includes(h)).slice(0,10);
  const head=useful.map(h=>`<th>${fieldLabel(h)}</th>`).join('');
  const body=rows.map(r=>`<tr onclick="openForm('${entity}','${escAttr(r.ID)}')">
    ${useful.map(h=>`<td title="${escAttr(display(r[h],h,r))}">${renderCell(r[h],h,r)}</td>`).join('')}
    <td onclick="event.stopPropagation()">${rowActions(entity,r)}</td></tr>`).join('');
  document.getElementById('tableArea').innerHTML=rows.length?`<div class="table-wrap"><table class="data-table"><thead><tr>${head}<th>إجراءات</th></tr></thead><tbody>${body}</tbody></table></div>`:'<div class="empty">لا توجد بيانات.</div>';
}

function rowActions(entity,r){
  let extra='';
  if(entity==='PURCHASE_REQUESTS'&&['IN_APPROVAL','DRAFT'].includes(r.Status)){
    extra+=`<button class="btn btn-sm" onclick="approvePurchase('${escAttr(r.ID)}')">اعتماد</button> `;
  }
  if((entity==='SUPPLIERS'||entity==='CLIENTS')){
    const t=entity==='SUPPLIERS'?'SUPPLIER':'CLIENT';
    extra+=`<button class="btn btn-sm" onclick="showStatement('${t}','${escAttr(r.ID)}')">كشف</button> `;
  }
  extra+=`<button class="btn btn-sm" onclick="printRecord('${entity}','${escAttr(r.ID)}')">طباعة</button> `;
  return extra+`<button class="btn btn-sm" onclick="openForm('${entity}','${escAttr(r.ID)}')">تعديل</button>`;
}

function openForm(entity,id){
  const sourceRows=STATE.allRows.length?STATE.allRows:STATE.rows;
  const record=Object.assign({},id?sourceRows.find(x=>x.ID===id)||{}:{});
  // عند وجود فلتر فرع، نجعل الإضافة الجديدة تابعة له افتراضيًا حتى تظهر فورًا في نفس القائمة.
  if(!id&&STATE.branchId&&(ENTITY_FIELDS[entity]||[]).includes('BranchID'))record.BranchID=STATE.branchId;
  if(!id&&entity==='INVOICES'){record.Date=localToday();record.TaxRate=String(STATE.boot.settings.tvaRate??19);record.InvoiceKind='NORMAL';record.Type='SALE';record.PartyType='CLIENT';record.Status='UNPAID';}
  STATE.currentRecord=record;
  const fields=ENTITY_FIELDS[entity]||[];
  const inputs=fields.map(f=>renderField(entity,f,record[f])).join('');
  const upload=id?`<div class="form-field full"><label>إرفاق ملف</label><div class="file-drop"><input id="attachmentFile" type="file"><button class="btn btn-sm" type="button" onclick="uploadAttachment('${entity}','${escAttr(id)}')">رفع إلى Google Drive</button></div></div>`:'';
  document.getElementById('modal').innerHTML=`<div class="modal-card">
    <div class="modal-head"><h3>${id?'تعديل':'إضافة'} ${ENTITY_META[entity]?.label||entity}</h3><button class="close" onclick="closeModal()">✕</button></div>
    <form id="recordForm" onsubmit="saveForm(event,'${entity}','${escAttr(id||'')}')">
      <div class="modal-body"><div class="form-grid">${inputs}${upload}</div></div>
      <div class="modal-foot"><button class="btn btn-primary" type="submit">حفظ</button>${id?`<button class="btn btn-danger" type="button" onclick="removeRecord('${entity}','${escAttr(id)}')">حذف</button>`:''}<button class="btn" type="button" onclick="closeModal()">إلغاء</button></div>
    </form></div>`;
  document.getElementById('modal').classList.remove('hidden');
  if(fields.includes('ItemsJSON')) initItemsEditor(record.ItemsJSON);
  if(entity==='INVOICES'){
    const form=document.getElementById('recordForm');
    ['TaxRate','Subtotal','Paid'].forEach(name=>form.elements[name]?.addEventListener('input',recalculateInvoiceForm));
    recalculateInvoiceForm();
  }
}

function renderField(entity,field,value){
  const meta=FIELD_META[field]||{label:field}; if(meta.hidden)return '';
  const full=meta.type==='textarea'||meta.type==='items'||['Notes','Description','Address'].includes(field);
  let control='';
  const enumValues=ENUMS[entity]?.[field];
  if(meta.type==='items'){
    control=`<div id="itemsEditor" class="items-editor"></div><input type="hidden" name="${field}" id="${field}">`;
  }else if(enumValues){
    control=`<select name="${field}"><option value="">— اختر —</option>${enumValues.map(([v,l])=>`<option value="${escAttr(v)}" ${String(value)===v?'selected':''}>${esc(l)}</option>`).join('')}</select>`;
  }else if(meta.select){
    const options=lookupOptions(meta.select,value);
    control=`<select name="${field}"><option value="">— اختر —</option>${options}</select>`;
  }else if(field==='PartyID'){
    const all=[...(STATE.boot.lookups.SUPPLIERS||[]).map(x=>[x.ID,'مورد: '+x.Name]),...(STATE.boot.lookups.CLIENTS||[]).map(x=>[x.ID,'زبون: '+x.Name])];
    control=`<select name="${field}"><option value="">— اختر —</option>${all.map(([v,l])=>`<option value="${escAttr(v)}" ${String(value)===v?'selected':''}>${esc(l)}</option>`).join('')}</select>`;
  }else if(meta.type==='textarea'){
    control=`<textarea name="${field}" rows="3" ${meta.readonly?'readonly':''}>${esc(value||'')}</textarea>`;
  }else if(meta.type==='checkbox'){
    control=`<input name="${field}" type="checkbox" ${value===true||String(value)==='true'||(!STATE.currentRecord.ID&&field==='Active')?'checked':''}>`;
  }else{
    const type=meta.type||'text';
    control=`<input name="${field}" type="${type}" value="${escAttr(dateInput(value,type))}" ${meta.readonly?'readonly':''} ${field==='Password'&&!STATE.currentRecord.ID?'required':''}>`;
  }
  return `<div class="form-field ${full?'full':''}"><label>${meta.label||field}</label>${control}</div>`;
}

function initItemsEditor(json){
  let items=[];try{items=JSON.parse(json||'[]')}catch(e){}
  if(!items.length)items=[{name:'',quantity:1,unitPrice:0}];
  const box=document.getElementById('itemsEditor');
  box.innerHTML=`<div id="itemRows"></div><button type="button" class="btn btn-sm" onclick="addItemRow()">+ مادة</button>`;
  items.forEach(addItemRow);syncItems();
}
function addItemRow(item={name:'',quantity:1,unitPrice:0}){
  const d=document.createElement('div');d.className='items-row';
  d.innerHTML=`<input class="item-name" placeholder="اسم المادة" value="${escAttr(item.name||item.Name||'')}" oninput="syncItems()">
    <input class="item-qty" type="number" min="0" step="0.01" value="${num(item.quantity||item.Quantity||1)}" oninput="syncItems()">
    <input class="item-price" type="number" min="0" step="0.01" value="${num(item.unitPrice||item.UnitPrice||0)}" oninput="syncItems()">
    <button class="btn btn-sm" type="button" onclick="this.parentElement.remove();syncItems()">✕</button>`;
  document.getElementById('itemRows').appendChild(d);syncItems();
}
function syncItems(){
  const items=[...document.querySelectorAll('.items-row')].map(r=>({name:r.querySelector('.item-name').value,quantity:num(r.querySelector('.item-qty').value),unitPrice:num(r.querySelector('.item-price').value)}));
  const inp=document.getElementById('ItemsJSON');if(inp)inp.value=JSON.stringify(items);
  recalculateInvoiceForm();
}

function recalculateInvoiceForm(){
  if(STATE.entity!=='INVOICES')return;
  const form=document.getElementById('recordForm');if(!form)return;
  const rows=[...document.querySelectorAll('.items-row')];
  const hasItems=rows.some(r=>r.querySelector('.item-name').value.trim()||num(r.querySelector('.item-price').value));
  let subtotal=hasItems?rows.reduce((sum,r)=>sum+num(r.querySelector('.item-qty').value)*num(r.querySelector('.item-price').value),0):num(form.elements.Subtotal?.value);
  const rateRaw=String(form.elements.TaxRate?.value??'');
  const hasRate=rateRaw!=='';
  const rate=num(rateRaw);
  const currentTva=num(form.elements.TVA?.value);
  const currentTotal=num(form.elements.Total?.value);
  const tva=hasRate?Math.round((subtotal*rate/100+Number.EPSILON)*100)/100:currentTva;
  const total=hasRate?Math.round((subtotal+tva+Number.EPSILON)*100)/100:(currentTotal||Math.round((subtotal+tva+Number.EPSILON)*100)/100);
  const paid=num(form.elements.Paid?.value);
  if(form.elements.Subtotal)form.elements.Subtotal.value=subtotal.toFixed(2);
  if(form.elements.TVA)form.elements.TVA.value=tva.toFixed(2);
  if(form.elements.Total)form.elements.Total.value=total.toFixed(2);
  if(form.elements.Balance)form.elements.Balance.value=Math.max(0,total-paid).toFixed(2);
}

async function saveForm(e,entity,id){
  e.preventDefault();
  if(STATE.saving)return;
  syncItems();
  const form=e.target,submit=form.querySelector('button[type="submit"]');
  const data={};
  (ENTITY_FIELDS[entity]||[]).forEach(f=>{
    const el=form.elements[f];if(!el)return;
    data[f]=el.type==='checkbox'?el.checked:el.value;
  });
  if(id)data.ID=id;

  STATE.saving=true;
  if(submit){submit.disabled=true;submit.dataset.oldText=submit.textContent;submit.textContent='جارٍ الحفظ...';}
  try{
    const r=await server('save',{token:STATE.token,entity,data});
    if(!r.ok){toast(r.message,true);return}

    const saved=Object.assign({},data,r.record||{});
    STATE.loadSequence++; // يمنع طلب قائمة قديم من إخفاء السجل الذي حُفظ للتو.
    upsertLocalRecord(entity,saved);
    upsertLookupRecord(entity,saved);
    if(entity==='BRANCHES')setupBranchFilter();

    // الإضافة تظهر مباشرة في أول الجدول، من دون bootstrap أو إعادة تحميل تلقائي من الخادم.
    if(!id){
      const search=document.getElementById('entitySearch');
      if(search)search.value='';
    }
    if(STATE.entity===entity)applyEntitySearch();
    closeModal();
    toast(r.message||'تم الحفظ.');
  }finally{
    STATE.saving=false;
    if(submit&&submit.isConnected){submit.disabled=false;submit.textContent=submit.dataset.oldText||'حفظ';}
  }
}

async function removeRecord(entity,id){
  if(!confirm('تأكيد حذف السجل؟'))return;
  const r=await server('remove',{token:STATE.token,entity,id});
  if(!r.ok){toast(r.message,true);return}
  STATE.loadSequence++;
  removeLocalRecord(entity,id);
  if(entity==='BRANCHES')setupBranchFilter();
  closeModal();
  if(STATE.entity===entity)applyEntitySearch();
  toast(r.message||'تم حذف السجل.');
}

async function approvePurchase(id){
  const r=await server('approvePurchase',{token:STATE.token,id});
  toast(r.message,!r.ok);
  if(r.ok&&r.record){
    STATE.loadSequence++;
    upsertLocalRecord('PURCHASE_REQUESTS',r.record);
    upsertLookupRecord('PURCHASE_REQUESTS',r.record);
    if(STATE.entity==='PURCHASE_REQUESTS')applyEntitySearch();
  }
}

async function uploadAttachment(entity,recordId){
  const f=document.getElementById('attachmentFile').files[0];if(!f){toast('اختر ملفًا.',true);return}
  if(f.size>8*1024*1024){toast('الحد الأقصى 8MB.',true);return}
  const dataUrl=await readFile(f);setLoading(true);
  const r=await server('upload',{token:STATE.token,entity,recordId,name:f.name,mimeType:f.type,dataUrl});setLoading(false);
  toast(r.message,!r.ok);if(r.ok)window.open(r.fileUrl,'_blank');
}

async function exportEntity(format){
  setLoading(true);const r=await server('export',{token:STATE.token,entity:STATE.entity,format,branchId:STATE.branchId});setLoading(false);
  toast(r.message,!r.ok);if(r.ok)window.open(r.fileUrl,'_blank');
}

async function printRecord(entity,id){
  const printWindow=window.open('','_blank');
  if(!printWindow){toast('اسمح بالنوافذ المنبثقة للطباعة.',true);return}
  printWindow.document.write('<p style="font-family:Tahoma;text-align:center;padding:40px">جاري تجهيز الوثيقة...</p>');
  setLoading(true);
  const r=await server('printDocument',{token:STATE.token,entity,id,branchId:STATE.branchId});
  setLoading(false);
  if(!r.ok){printWindow.close();toast(r.message,true);return}
  openPrintWindow(r.html,r.title||'وثيقة',printWindow);
}

function printAnnualReport(){
  if(!STATE.annual){toast('حمّل التقرير السنوي أولًا.',true);return}
  const r=STATE.annual,s=r.summary,cur=STATE.boot.settings.currency;
  const monthNames=['جانفي','فيفري','مارس','أفريل','ماي','جوان','جويلية','أوت','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const canViewZakat=STATE.boot?.user?.Role==='GENERAL_MANAGER' && r.canViewZakat===true;
  const zakatPrint=canViewZakat?`<div><b>تقدير الزكاة ${num(s.zakatRate||2.5)}%</b><span>${money(s.zakatEstimate,cur)}</span></div>`:'';

  const months=`<h3>التفاصيل الشهرية</h3><table><thead><tr><th>الشهر</th><th>المبيعات</th><th>المشتريات</th><th>الربح</th><th>TVA محصلة</th><th>TVA مدفوعة</th></tr></thead><tbody>${r.months.map((m,i)=>`<tr><td>${monthNames[i]}</td><td>${money(m.sales,cur)}</td><td>${money(m.purchases,cur)}</td><td>${money(m.profit,cur)}</td><td>${money(m.tvaCollected,cur)}</td><td>${money(m.tvaPaid,cur)}</td></tr>`).join('')}</tbody></table>`;
  const branches=`<h3>حسب الفرع</h3><table><thead><tr><th>الفرع</th><th>المبيعات</th><th>المشتريات</th><th>الربح</th></tr></thead><tbody>${(r.branches||[]).map(b=>`<tr><td>${esc(b.branchName)}</td><td>${money(b.sales,cur)}</td><td>${money(b.purchases,cur)}</td><td>${money(b.profit,cur)}</td></tr>`).join('')}</tbody></table>`;
  const zakatNote=canViewZakat?`<p class="note">تقدير الزكاة إرشادي بنسبة ${num(s.zakatRate||2.5)}% من الربح الموجب.</p>`:'';
  openPrintWindow(buildClientPrintShell('التقرير السنوي '+r.year,summary+months+branches+zakatNote),'التقرير السنوي '+r.year);
}

function buildClientPrintShell(title,body){
  const c=Object.assign({},DEFAULT_COMPANY,STATE.boot?.settings||{});
  return `<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>${esc(title)}</title><style>@page{size:A4;margin:12mm}*{box-sizing:border-box}body{font-family:Tahoma,Arial,sans-serif;color:#17212b;margin:0;font-size:11px}.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #2563eb;padding-bottom:12px;margin-bottom:16px}.head img{width:85px;height:85px;object-fit:contain}.head h1{font-size:20px;margin:0 0 5px}.head p{margin:3px 0}.ids{font-size:9px;line-height:1.7}.title{text-align:center;color:#1d4ed8;font-size:20px}table{width:100%;border-collapse:collapse;margin:12px 0;font-size:9px}th,td{border:1px solid #b8c0cc;padding:5px;text-align:right}th{background:#eaf2ff}.report-date,.note{color:#667085;margin:10px 0}.print-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.print-cards div{border:1px solid #d0d5dd;border-radius:7px;padding:10px}.print-cards b,.print-cards span{display:block}.print-cards span{font-size:14px;margin-top:5px;font-weight:bold}</style></head><body><div class="head"><div><h1>${esc(c.legalName||c.companyName)}</h1><p>${esc(c.address)}</p><div class="ids">RC: ${esc(c.rc)} | NIF: ${esc(c.nif)}<br>ART: ${esc(c.art)} | NIS: ${esc(c.nis)}</div></div>${c.logoUrl?`<img src="${escAttr(c.logoUrl)}" alt="Logo">`:''}</div><h2 class="title">${esc(title)}</h2>${body}</body></html>`;
}

function openPrintWindow(html,title,existingWindow){
  const w=existingWindow||window.open('','_blank');
  if(!w){toast('اسمح بالنوافذ المنبثقة للطباعة.',true);return}
  w.document.open();w.document.write(html);w.document.close();w.document.title=title||'طباعة';
  setTimeout(()=>{w.focus();w.print()},500);
}

function upsertLocalRecord(entity,record){
  if(!record||!record.ID)return;
  if(STATE.entity===entity&&!STATE.headers.length)STATE.headers=['ID',...(ENTITY_FIELDS[entity]||Object.keys(record))];
  const key=entityCacheKey(entity);
  const current=(STATE.entity===entity?STATE.allRows:(STATE.entityCache[key]?.rows||[])).map(r=>Object.assign({},r));
  const index=current.findIndex(r=>String(r.ID)===String(record.ID));
  if(index>=0)current[index]=Object.assign({},current[index],record);
  else current.unshift(Object.assign({},record));

  if(STATE.entity===entity)STATE.allRows=current;
  const headers=(STATE.entity===entity&&STATE.headers.length?STATE.headers:(STATE.entityCache[key]?.headers||Object.keys(record))).slice();
  STATE.entityCache[key]={headers,rows:current.map(r=>Object.assign({},r)),total:current.length};
}

function removeLocalRecord(entity,id){
  const key=entityCacheKey(entity);
  if(STATE.entity===entity)STATE.allRows=STATE.allRows.filter(r=>String(r.ID)!==String(id));
  if(STATE.entityCache[key]){
    STATE.entityCache[key].rows=STATE.entityCache[key].rows.filter(r=>String(r.ID)!==String(id));
    STATE.entityCache[key].total=STATE.entityCache[key].rows.length;
  }
  const lookup=STATE.boot?.lookups?.[entity];
  if(Array.isArray(lookup))STATE.boot.lookups[entity]=lookup.filter(r=>String(r.ID)!==String(id));
}

function upsertLookupRecord(entity,record){
  const lookup=STATE.boot?.lookups?.[entity];
  if(!Array.isArray(lookup)||!record?.ID)return;
  const index=lookup.findIndex(r=>String(r.ID)===String(record.ID));
  if(index>=0)lookup[index]=Object.assign({},lookup[index],record);
  else lookup.unshift(Object.assign({},record));
}

async function refreshLookups(){
  // بقيت هذه الدالة للتوافق فقط؛ لا تُستدعى بعد الحفظ حتى لا نعيد bootstrap كاملًا.
  const r=await server('bootstrap',{token:STATE.token});
  if(r.ok){STATE.boot=r;STATE.boot.settings=Object.assign({},DEFAULT_COMPANY,r.settings||{});setupBranchFilter();}
}
const LOOKUP_FIELD_ENTITY={
  BranchID:'BRANCHES',ProjectID:'PROJECTS',ClientID:'CLIENTS',SupplierID:'SUPPLIERS',
  BankID:'BANKS',WarehouseID:'WAREHOUSES',MaterialID:'MATERIALS',InvoiceID:'INVOICES',
  RequestID:'PURCHASE_REQUESTS'
};
function lookupRecordLabel(entity,r){
  if(!r)return'';
  const labels={
    BRANCHES:r.Name,
    PROJECTS:r.Name||r.ProjectNo,
    SUPPLIERS:r.Name,
    CLIENTS:r.Name,
    BANKS:r.Name||r.AccountNo,
    WAREHOUSES:r.Name||r.Code,
    MATERIALS:r.Name||r.Code,
    INVOICES:r.InvoiceNo,
    PURCHASE_REQUESTS:r.RequestNo,
    PURCHASE_ORDERS:r.OrderNo,
    PAYMENTS:r.PaymentNo,
    USERS:r.Name||r.Email
  };
  return labels[entity]||r.Name||r.ProjectNo||r.RequestNo||r.OrderNo||r.InvoiceNo||r.PaymentNo||r.Code||r.Email||r.ID;
}
function resolveReferenceLabel(field,value,record){
  if(value===null||value===undefined||value==='')return'';
  const id=String(value);
  if(field==='PartyID'){
    const preferred=record?.PartyType==='SUPPLIER'?'SUPPLIERS':record?.PartyType==='CLIENT'?'CLIENTS':'';
    const entities=preferred?[preferred]:['SUPPLIERS','CLIENTS'];
    for(const entity of entities){
      const row=(STATE.boot?.lookups?.[entity]||[]).find(x=>String(x.ID)===id);
      if(row)return lookupRecordLabel(entity,row);
    }
    for(const entity of ['SUPPLIERS','CLIENTS']){
      const row=(STATE.boot?.lookups?.[entity]||[]).find(x=>String(x.ID)===id);
      if(row)return lookupRecordLabel(entity,row);
    }
    return id;
  }
  const entity=LOOKUP_FIELD_ENTITY[field];
  if(!entity)return String(value);
  const row=(STATE.boot?.lookups?.[entity]||[]).find(x=>String(x.ID)===id);
  return row?lookupRecordLabel(entity,row):id;
}
function lookupOptions(entity,value){
  const rows=STATE.boot.lookups[entity]||[];
  const current=String(value??'');
  let found=false;
  const options=rows.map(r=>{
    const selected=current===String(r.ID);
    if(selected)found=true;
    return`<option value="${escAttr(r.ID)}" ${selected?'selected':''}>${esc(lookupRecordLabel(entity,r))}</option>`;
  }).join('');
  return options+(!found&&current?`<option value="${escAttr(current)}" selected>${esc(current)}</option>`:'');
}
function debouncedLoad(){
  clearTimeout(STATE.searchTimer);
  STATE.searchTimer=setTimeout(applyEntitySearch,120);
}
function closeModal(){document.getElementById('modal').classList.add('hidden');document.getElementById('modal').innerHTML=''}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function title(t,s=''){document.getElementById('pageTitle').textContent=t;document.getElementById('pageSubtitle').textContent=s}
function showLogin(){document.getElementById('loginView').classList.remove('hidden');document.getElementById('appView').classList.add('hidden')}
function showLoginError(m){const e=document.getElementById('loginError');e.textContent=m;e.classList.remove('hidden')}
function logout(){server('logout',{token:STATE.token});localStorage.removeItem('zf_erp_token');STATE.token='';location.reload()}
function setLoading(v){document.getElementById('loader').classList.toggle('hidden',!v)}
function toast(msg,bad=false){const d=document.createElement('div');d.className='toast'+(bad?' bad':'');d.textContent=msg||'تم';document.getElementById('toastWrap').appendChild(d);setTimeout(()=>d.remove(),3500)}
function server(action,payload){
  return new Promise(resolve=>{
    const url=String(CONFIG.GAS_WEB_APP_URL||'').trim();
    if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test(url)){
      resolve({ok:false,message:'رابط Apps Script غير صالح. يجب أن يبدأ بـ https://script.google.com/macros/s/ وينتهي بـ /exec'});
      return;
    }
    if(location.protocol==='file:'){
      resolve({ok:false,message:'لا تفتح index.html بالنقر المباشر. شغّله عبر GitHub Pages.'});
      return;
    }

    const requestId=(self.crypto&&crypto.randomUUID)
      ? crypto.randomUUID()
      : Date.now()+'_'+Math.random().toString(36).slice(2);
    const frameName='zf_api_'+requestId.replace(/[^a-zA-Z0-9_]/g,'');

    const iframe=document.createElement('iframe');
    iframe.name=frameName;
    iframe.id=frameName;
    iframe.hidden=true;
    iframe.setAttribute('aria-hidden','true');
    iframe.style.display='none';

    const form=document.createElement('form');
    form.method='POST';
    form.action=url;
    form.target=frameName;
    form.enctype='application/x-www-form-urlencoded';
    form.acceptCharset='UTF-8';
    form.style.display='none';

    const fields={
      requestId:requestId,
      action:String(action||''),
      payload:JSON.stringify(payload||{}),
      origin:location.origin
    };

    Object.entries(fields).forEach(([name,value])=>{
      const input=document.createElement('input');
      input.type='hidden';
      input.name=name;
      input.value=String(value);
      form.appendChild(input);
    });

    const cleanup=()=>{
      try{form.remove()}catch(_){}
      try{iframe.remove()}catch(_){}
    };

    const timer=setTimeout(()=>{
      if(!API_PENDING.has(requestId)) return;
      API_PENDING.delete(requestId);
      cleanup();
      resolve({
        ok:false,
        message:'لم تصل استجابة من Apps Script. افتح رابط /exec مباشرة: إن طلب تسجيل الدخول فأعد النشر باختيار Execute as me وWho has access: Anyone، ثم أنشئ إصدار نشر جديد.'
      });
    },CONFIG.REQUEST_TIMEOUT_MS);

    API_PENDING.set(requestId,{resolve,timer,cleanup});
    document.body.appendChild(iframe);
    document.body.appendChild(form);

    try{
      // تأخير بسيط يضمن أن iframe أصبح هدفاً صالحاً قبل إرسال النموذج.
      setTimeout(()=>{
        try{
          form.submit();
          setTimeout(()=>{ try{form.remove()}catch(_){} },250);
        }catch(err){
          clearTimeout(timer);
          API_PENDING.delete(requestId);
          cleanup();
          resolve({ok:false,message:'فشل إرسال الطلب إلى Apps Script: '+(err.message||String(err))});
        }
      },30);
    }catch(err){
      clearTimeout(timer);
      API_PENDING.delete(requestId);
      cleanup();
      resolve({ok:false,message:'فشل تجهيز الاتصال: '+(err.message||String(err))});
    }
  });
}
function localToday(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function val(id){return document.getElementById(id).value.trim()}
function fieldLabel(f){return FIELD_META[f]?.label||f}
function display(v,f,record){
  if(v===true)return'نعم';if(v===false)return'لا';if(v===null||v===undefined)return'';
  if(f==='ItemsJSON'){try{return JSON.parse(v).map(x=>x.name).join('، ')}catch(e){}}
  if(f==='PartyID'||LOOKUP_FIELD_ENTITY[f])return resolveReferenceLabel(f,v,record);
  return String(v);
}
function renderCell(v,f,record){
  const s=display(v,f,record);
  if(['Status','Type','CurrentStage'].includes(f))return`<span class="badge ${statusClass(s)}">${esc(statusText(s))}</span>`;
  if(typeof v==='number'||['Total','Balance','Paid','CurrentBalance','Salary','Amount','Debit','Credit'].includes(f))return esc(new Intl.NumberFormat('ar-DZ').format(num(v)));
  return esc(s);
}
function statusText(s){return({ACTIVE:'جارية',PAUSED:'متوقفة',COMPLETED:'منتهية',PAID:'مدفوعة',PARTIAL:'جزئية',UNPAID:'غير مدفوعة',APPROVED:'معتمد',IN_APPROVAL:'قيد الاعتماد',REJECTED:'مرفوض',DRAFT:'مسودة',PENDING:'معلقة',RECEIVED:'مستلم',WORKING:'تعمل',MAINTENANCE:'صيانة',AVAILABLE:'متاحة',BRANCH_MANAGER:'مدير الفرع',FINANCE_MANAGER:'المدير المالي',GENERAL_MANAGER:'المدير العام',COMPLETED:'منتهية'})[s]||s}
function statusClass(s){s=String(s).toUpperCase();if(['PAID','APPROVED','ACTIVE','COMPLETED','RECEIVED','AVAILABLE'].includes(s))return'ok';if(['PENDING','PARTIAL','IN_APPROVAL','MAINTENANCE','DRAFT'].includes(s))return'warn';if(['REJECTED','OVERDUE','CANCELLED','OUT_OF_SERVICE'].includes(s))return'danger';return''}
function money(v,c='DZD'){return new Intl.NumberFormat('ar-DZ',{maximumFractionDigits:2}).format(num(v))+' '+c}
function num(v){const n=Number(String(v??0).replace(',','.'));return Number.isFinite(n)?n:0}
function dateInput(v,type){if(type!=='date'||!v)return v||'';return String(v).slice(0,10)}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
window.addEventListener('unhandledrejection',e=>{
  console.error('UNHANDLED PROMISE:',e.reason);
  setLoading(false);
  if(!STATE.boot) showLoginError('خطأ غير متوقع: '+((e.reason&&e.reason.message)||e.reason||'Unknown error'));
});
window.addEventListener('error',e=>{
  console.error('WINDOW ERROR:',e.error||e.message);
  setLoading(false);
  if(!STATE.boot) showLoginError('خطأ في الواجهة: '+(e.message||'Unknown error'));
});
</script>
