    .login-card{width:min(440px,100%);background:#fff;border:1px solid #ffffffaa;border-radius:24px;padding:32px;box-shadow:var(--shadow)}

    label{display:block;font-size:13px;font-weight:700;margin:14px 0 7px}

    .btn-danger{color:#fff;background:var(--danger);border-color:var(--danger)}.btn-sm{padding:7px 10px;font-size:12px}

    .content{padding:24px;max-width:1700px;margin:auto}.page-head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.page-head h2{margin:0;font-size:24px}

    .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;min-width:0}

    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}.data-table{width:100%;border-collapse:collapse;white-space:nowrap;background:#fff}.data-table th,.data-table td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:12px;text-align:right;max-width:260px;overflow:hidden;text-overflow:ellipsis}

    .close{border:0;background:#f2f4f7;border-radius:9px;width:34px;height:34px}.toast-wrap{position:fixed;left:20px;bottom:20px;z-index:50;display:grid;gap:8px}.toast{background:#101828;color:#fff;padding:12px 15px;border-radius:10px;box-shadow:var(--shadow);min-width:260px}.toast.bad{background:#7a271a}
    .loader{position:fixed;inset:0;background:#ffffffaa;backdrop-filter:blur(2px);z-index:60;display:grid;place-items:center}.spinner{width:42px;height:42px;border:4px solid #dbeafe;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

    .map-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;background:var(--danger);color:#fff;border-radius:50% 50% 50% 0;rotate:-45deg;display:grid;place-items:center;box-shadow:0 4px 12px #0003}.map-pin span{rotate:45deg;font-size:11px}.map-note{position:absolute;bottom:12px;right:12px;background:#ffffffdd;padding:8px 10px;border-radius:8px;font-size:11px}
    .items-editor{border:1px solid var(--line);border-radius:12px;padding:12px}.items-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end}

</head>
<body>
<div id="loader" class="loader hidden"><div class="spinner"></div></div>
<div id="toastWrap" class="toast-wrap"></div>

<section id="loginView" class="login-wrap">
  <div class="login-card">

    <p class="muted">إدارة الفروع، الورشات، المالية، المخزون والموارد من مكان واحد.</p>
    <form id="loginForm">
      <label>البريد الإلكتروني</label>

  </div>
</section>

<section id="appView" class="app hidden">
  <div class="shell">

      <div class="brand"><div class="logo">ZF</div><div><strong id="companyName">ERP</strong><small>Construction Management</small></div></div>
      <nav id="nav" class="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn menu-btn" onclick="toggleSidebar()">☰</button>
          <div><strong id="pageTitle">لوحة القيادة</strong><div class="muted" style="font-size:12px" id="pageSubtitle"></div></div>
        </div>
        <div class="topbar-right">
          <button class="btn btn-sm" onclick="openPasswordModal()">🔐</button>
          <div class="avatar" id="avatar">م</div>
          <div><strong id="userName" style="font-size:13px"></strong><div id="userRole" class="muted" style="font-size:11px"></div></div>
          <button class="btn btn-sm" onclick="logout()">خروج</button>
        </div>
      </header>
      <div id="content" class="content"></div>
    </main>
  </div>
</section>

<div id="modal" class="modal hidden"></div>

const CONFIG = {
  // ألصق هنا رابط نشر Google Apps Script الذي ينتهي بـ /exec
  GAS_WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbyIN2f0tNF5ejL7-35Y7CJAmQlYfb_06GWzG0pZUeumI7-BnN8CjpNV0Rw1QmiItkpp/exec',
  REQUEST_TIMEOUT_MS: 60000
};

const API_PENDING = new Map();

function isTrustedApiOrigin(origin){
  return origin==='https://script.google.com' ||
    /^https:\/\/(?:[a-z0-9-]+\.)*googleusercontent\.com$/i.test(origin) ||
    /^http:\/\/(localhost|127\.0\.0\.1)(?::\d+)?$/i.test(origin);
}

window.addEventListener('message', event => {
  const data = event.data || {};
  if(data.channel !== 'ZF_ERP_API' || data.type !== 'RESPONSE' || !data.requestId) return;

  // نتحقق أولاً من وجود طلب معلّق يحمل المعرف نفسه.
  // بعض متصفحات الهاتف تعيد origin بالقيمة "null" لصفحات Apps Script داخل iframe.
  const pending = API_PENDING.get(data.requestId);
  if(!pending) return;
  if(event.origin !== 'null' && !isTrustedApiOrigin(event.origin)) return;

  clearTimeout(pending.timer);
  API_PENDING.delete(data.requestId);
  pending.cleanup();
  pending.resolve(data.result || {ok:false,message:'لم يرجع الخادم أي بيانات.'});
});

  INVOICES:{Type:[['PURCHASE','شراء'],['SALE','بيع'],['SERVICE','خدمة']],PartyType:[['SUPPLIER','مورد'],['CLIENT','زبون']],Status:[['UNPAID','غير مدفوعة'],['PARTIAL','مدفوعة جزئيًا'],['PAID','مدفوعة'],['CANCELLED','ملغاة']]},

  USERS:{Role:Object.entries({GENERAL_MANAGER:'المدير العام',FINANCE_MANAGER:'المدير المالي',BRANCH_MANAGER:'مدير الفرع',SITE_MANAGER:'مسؤول الورشة',ACCOUNTANT:'المحاسب',STOREKEEPER:'أمين المخزن',HR_MANAGER:'مسؤول الموارد البشرية',PURCHASING:'المشتريات'})}
};

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('loginError').classList.add('hidden');
  setLoading(true);
  try {
    const res = await server('login',{email:val('loginEmail'),password:val('loginPassword')});
    if(!res || !res.ok){
      showLoginError((res && res.message) || 'تعذر تسجيل الدخول.');
      return;
    }
    STATE.token=res.token;
    localStorage.setItem('zf_erp_token',res.token);
    await startApp();
  } catch(err) {
    console.error('LOGIN ERROR:',err);
    localStorage.removeItem('zf_erp_token');
    STATE.token='';
    showLoginError('خطأ تسجيل الدخول: '+(err.message || String(err)));
  } finally {
    setLoading(false);
  }
});

window.addEventListener('load', async ()=>{
  const info=document.getElementById('connectionInfo');
  if(!String(CONFIG.GAS_WEB_APP_URL||'').includes('/exec')){
    if(info) info.textContent='الخادم غير مضبوط: ألصق رابط /exec داخل GAS_WEB_APP_URL.';
    showLoginError('الإعداد الأول: ألصق رابط Apps Script المنشور داخل GAS_WEB_APP_URL في index.html.');
    return;
  }

  const ping=await server('ping',{});
  if(ping && ping.ok){
    if(info) info.textContent='✓ الخادم متصل — '+(ping.version||'Apps Script');
  }else{
    if(info) info.textContent='✕ تعذر الاتصال بالخادم';
    showLoginError((ping&&ping.message) || 'تعذر الاتصال. تأكد من رابط /exec وإعداد النشر Anyone.');
    return;
  }

  if(STATE.token) startApp();
});

async function startApp(){
  setLoading(true);
  try{
    const res=await server('bootstrap',{token:STATE.token});

    if(!res || !res.ok){
      throw new Error((res && res.message) || 'تعذر تحميل بيانات النظام.');
    }

    if(!res.user || !res.settings || !res.dashboard || !res.dashboard.cards){
      throw new Error('استجابة النظام ناقصة. شغّل setupERP ثم أعد نشر التطبيق.');
    }

    STATE.boot=res;

    document.getElementById('companyName').textContent=res.settings.companyName || 'ZF ERP';
    document.getElementById('userName').textContent=res.user.Name || res.user.Email || 'مستخدم';
    document.getElementById('userRole').textContent=res.user.RoleName || res.user.Role || '';
    document.getElementById('avatar').textContent=(res.user.Name || 'م').slice(0,1);

    buildNav();
    showDashboard(res.dashboard);

    // لا نخفي صفحة الدخول إلا بعد نجاح رسم لوحة القيادة.
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('appView').classList.remove('hidden');
    document.getElementById('loginError').classList.add('hidden');
  }catch(err){
    console.error('START APP ERROR:',err);
    localStorage.removeItem('zf_erp_token');
    STATE.token='';
    STATE.boot=null;
    document.getElementById('appView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
    showLoginError('خطأ تحميل النظام: '+(err.message || String(err)));
  }finally{
    setLoading(false);
  }
}

function buildNav(){
  const nav=document.getElementById('nav');
  const groups=[
    ['الرئيسية',[['dashboard','لوحة القيادة','📊']]],
    ['العمليات',['PROJECTS','BRANCHES','PURCHASE_REQUESTS','PURCHASE_ORDERS','WAREHOUSES','MATERIALS','STOCK_MOVEMENTS']],
    ['المالية',['SUPPLIERS','CLIENTS','BANKS','BANK_TRANSACTIONS','CASH_TRANSACTIONS','INVOICES','PAYMENTS','JOURNAL']],
    ['الموارد',['WORKERS','EQUIPMENT','USERS','NOTIFICATIONS']]
  ];
  let html='';
  groups.forEach(([title,items])=>{
    const visible=items.filter(x=>Array.isArray(x)||STATE.boot.entities.includes(x));
    if(!visible.length)return;
    html+=`<div class="sep">${title}</div>`;
    visible.forEach(item=>{
      if(Array.isArray(item)) html+=`<button data-view="${item[0]}" onclick="showDashboard()"><span>${item[2]}</span>${item[1]}</button>`;
      else {const m=ENTITY_META[item]||{label:item,icon:'•'};html+=`<button data-view="${item}" onclick="openEntity('${item}')"><span>${m.icon}</span>${m.label}</button>`}
    });
  });
  nav.innerHTML=html;
}

function setActiveNav(view){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  document.getElementById('sidebar').classList.remove('open');
}

  const metrics=[
    ['💰','رصيد جميع البنوك',money(c.bankTotal,cur)],
    ['📦','ديون الموردين',money(c.supplierDebt,cur)],
    ['💵','مستحقات الزبائن',money(c.clientReceivables,cur)],
    ['🚜','الورشات الجارية',c.activeProjects],
    ['✅','الورشات المنتهية',c.completedProjects],
    ['📈','ربح الشهر',money(c.monthlyProfit,cur)],

    ['🧱','مواد تحت الحد',c.lowStock],

    <div class="progress"><i style="width:${Math.min(100,num(p.Progress))}%"></i></div>
  </div>`).join('')||'<div class="empty">لا توجد ورشات بعد.</div>';

  document.getElementById('content').innerHTML=`
    <div class="page-head"><div><h2>مرحبًا، ${esc(STATE.boot.user.Name)}</h2><p class="muted">هذه أهم المؤشرات الحالية.</p></div><button class="btn" onclick="refreshDashboard()">تحديث ↻</button></div>
    <div class="cards">${cards}</div>
    <div class="grid2">
      <section class="panel"><div class="panel-head"><h3>تقدم الورشات</h3><button class="btn btn-sm" onclick="openEntity('PROJECTS')">عرض الكل</button></div>${projects}</section>
      <section class="panel"><div class="panel-head"><h3>الإشعارات</h3></div>${notes}</section>
    </div>

      <section class="panel"><div class="panel-head"><h3>خريطة الورشات</h3></div>${renderMap(d.projects||[])}</section>

        <p class="muted">اضغط على أي وحدة من القائمة الجانبية لإدارة البيانات، أو استخدم أزرار PDF وExcel لاستخراج التقارير.</p>
        <button class="btn btn-primary" onclick="openEntity('PURCHASE_REQUESTS')">إنشاء طلب شراء</button>

function renderMap(projects){
  const pins=projects.filter(p=>p.Latitude&&p.Longitude).slice(0,15).map((p,i)=>{
    const x=12+((Math.abs(Number(p.Longitude))*17+i*13)%76),y=15+((Math.abs(Number(p.Latitude))*11+i*19)%68);
    const url=`https://www.google.com/maps?q=${encodeURIComponent(p.Latitude+','+p.Longitude)}`;
    return `<a class="map-pin" style="left:${x}%;top:${y}%" href="${url}" target="_blank" title="${esc(p.Name)}"><span>${i+1}</span></a>`;
  }).join('');
  return `<div class="map-box"><div class="map-grid"></div>${pins}<div class="map-note">اضغط على العلامة لفتح الموقع في Google Maps</div></div>`;
}

async function refreshDashboard(){
  setLoading(true);const r=await server('dashboard',{token:STATE.token});setLoading(false);
  if(r.ok){STATE.boot.dashboard=r;showDashboard(r)}else toast(r.message,true);

async function openEntity(entity){
  STATE.entity=entity;setActiveNav(entity);
  const m=ENTITY_META[entity]||{label:entity};
  title(m.label,'إدارة السجلات والبحث والتقارير');
  document.getElementById('content').innerHTML=`
    <div class="page-head"><div><h2>${m.icon||''} ${m.label}</h2><p class="muted">إضافة وتعديل ومتابعة السجلات.</p></div>
      <div class="actions">${ENTITY_FIELDS[entity]?`<button class="btn btn-primary" onclick="openForm('${entity}')">+ إضافة</button>`:''}</div></div>
    <section class="panel">
      <div class="toolbar">
        <div class="search"><span>⌕</span><input id="entitySearch" placeholder="بحث..." oninput="debouncedLoad()"></div>
        <div class="actions"><button class="btn btn-sm" onclick="exportEntity('pdf')">PDF</button><button class="btn btn-sm" onclick="exportEntity('xlsx')">Excel</button><button class="btn btn-sm" onclick="loadEntity()">تحديث ↻</button></div>
      </div>
      <div id="tableArea"><div class="empty">جاري التحميل...</div></div>
    </section>`;
  await loadEntity();
}

async function loadEntity(){
  if(!STATE.entity)return;
  const search=document.getElementById('entitySearch')?.value||'';
  setLoading(true);
  const r=await server('list',{token:STATE.token,entity:STATE.entity,search,pageSize:200});
  setLoading(false);
  if(!r.ok){toast(r.message,true);return}
  STATE.rows=r.rows;renderTable(r.headers,r.rows);
}

function renderTable(headers,rows){
  const entity=STATE.entity;
  const useful=(ENTITY_FIELDS[entity]||headers).filter(h=>!['PasswordHash','ItemsJSON'].includes(h)).slice(0,10);
  const head=useful.map(h=>`<th>${fieldLabel(h)}</th>`).join('');
  const body=rows.map(r=>`<tr onclick="openForm('${entity}','${escAttr(r.ID)}')">
    ${useful.map(h=>`<td title="${escAttr(display(r[h],h))}">${renderCell(r[h],h)}</td>`).join('')}
    <td onclick="event.stopPropagation()">${rowActions(entity,r)}</td></tr>`).join('');
  document.getElementById('tableArea').innerHTML=rows.length?`<div class="table-wrap"><table class="data-table"><thead><tr>${head}<th>إجراءات</th></tr></thead><tbody>${body}</tbody></table></div>`:'<div class="empty">لا توجد بيانات.</div>';
}

function rowActions(entity,r){
  let extra='';
  if(entity==='PURCHASE_REQUESTS'&&['IN_APPROVAL','DRAFT'].includes(r.Status)){
    extra+=`<button class="btn btn-sm" onclick="approvePurchase('${escAttr(r.ID)}')">اعتماد</button> `;
  }
  if((entity==='SUPPLIERS'||entity==='CLIENTS')){
    const t=entity==='SUPPLIERS'?'SUPPLIER':'CLIENT';
    extra+=`<button class="btn btn-sm" onclick="showStatement('${t}','${escAttr(r.ID)}')">كشف</button> `;
  }
  return extra+`<button class="btn btn-sm" onclick="openForm('${entity}','${escAttr(r.ID)}')">تعديل</button>`;
}

function openForm(entity,id){
  const record=id?STATE.rows.find(x=>x.ID===id)||{}:{};
  STATE.currentRecord=record;
  const fields=ENTITY_FIELDS[entity]||[];
  const inputs=fields.map(f=>renderField(entity,f,record[f])).join('');
  const upload=id?`<div class="form-field full"><label>إرفاق ملف</label><div class="file-drop"><input id="attachmentFile" type="file"><button class="btn btn-sm" type="button" onclick="uploadAttachment('${entity}','${escAttr(id)}')">رفع إلى Google Drive</button></div></div>`:'';
  document.getElementById('modal').innerHTML=`<div class="modal-card">
    <div class="modal-head"><h3>${id?'تعديل':'إضافة'} ${ENTITY_META[entity]?.label||entity}</h3><button class="close" onclick="closeModal()">✕</button></div>
    <form id="recordForm" onsubmit="saveForm(event,'${entity}','${escAttr(id||'')}')">
      <div class="modal-body"><div class="form-grid">${inputs}${upload}</div></div>
      <div class="modal-foot"><button class="btn btn-primary" type="submit">حفظ</button>${id?`<button class="btn btn-danger" type="button" onclick="removeRecord('${entity}','${escAttr(id)}')">حذف</button>`:''}<button class="btn" type="button" onclick="closeModal()">إلغاء</button></div>
    </form></div>`;
  document.getElementById('modal').classList.remove('hidden');
  if(fields.includes('ItemsJSON')) initItemsEditor(record.ItemsJSON);
}

function renderField(entity,field,value){
  const meta=FIELD_META[field]||{label:field}; if(meta.hidden)return '';
  const full=meta.type==='textarea'||meta.type==='items'||['Notes','Description','Address'].includes(field);
  let control='';
  const enumValues=ENUMS[entity]?.[field];
  if(meta.type==='items'){
    control=`<div id="itemsEditor" class="items-editor"></div><input type="hidden" name="${field}" id="${field}">`;
  }else if(enumValues){
    control=`<select name="${field}"><option value="">— اختر —</option>${enumValues.map(([v,l])=>`<option value="${escAttr(v)}" ${String(value)===v?'selected':''}>${esc(l)}</option>`).join('')}</select>`;
  }else if(meta.select){
    const options=lookupOptions(meta.select,value);
    control=`<select name="${field}"><option value="">— اختر —</option>${options}</select>`;
  }else if(field==='PartyID'){
    const all=[...(STATE.boot.lookups.SUPPLIERS||[]).map(x=>[x.ID,'مورد: '+x.Name]),...(STATE.boot.lookups.CLIENTS||[]).map(x=>[x.ID,'زبون: '+x.Name])];
    control=`<select name="${field}"><option value="">— اختر —</option>${all.map(([v,l])=>`<option value="${escAttr(v)}" ${String(value)===v?'selected':''}>${esc(l)}</option>`).join('')}</select>`;
  }else if(meta.type==='textarea'){
    control=`<textarea name="${field}" rows="3" ${meta.readonly?'readonly':''}>${esc(value||'')}</textarea>`;
  }else if(meta.type==='checkbox'){
    control=`<input name="${field}" type="checkbox" ${value===true||String(value)==='true'||(!STATE.currentRecord.ID&&field==='Active')?'checked':''}>`;
  }else{
    const type=meta.type||'text';
    control=`<input name="${field}" type="${type}" value="${escAttr(dateInput(value,type))}" ${meta.readonly?'readonly':''} ${field==='Password'&&!STATE.currentRecord.ID?'required':''}>`;
  }
  return `<div class="form-field ${full?'full':''}"><label>${meta.label||field}</label>${control}</div>`;
}

function initItemsEditor(json){
  let items=[];try{items=JSON.parse(json||'[]')}catch(e){}
  if(!items.length)items=[{name:'',quantity:1,unitPrice:0}];
  const box=document.getElementById('itemsEditor');
  box.innerHTML=`<div id="itemRows"></div><button type="button" class="btn btn-sm" onclick="addItemRow()">+ مادة</button>`;
  items.forEach(addItemRow);syncItems();
}
function addItemRow(item={name:'',quantity:1,unitPrice:0}){
  const d=document.createElement('div');d.className='items-row';
  d.innerHTML=`<input class="item-name" placeholder="اسم المادة" value="${escAttr(item.name||item.Name||'')}" oninput="syncItems()">
    <input class="item-qty" type="number" min="0" step="0.01" value="${num(item.quantity||item.Quantity||1)}" oninput="syncItems()">
    <input class="item-price" type="number" min="0" step="0.01" value="${num(item.unitPrice||item.UnitPrice||0)}" oninput="syncItems()">
    <button class="btn btn-sm" type="button" onclick="this.parentElement.remove();syncItems()">✕</button>`;
  document.getElementById('itemRows').appendChild(d);syncItems();
}
function syncItems(){
  const items=[...document.querySelectorAll('.items-row')].map(r=>({name:r.querySelector('.item-name').value,quantity:num(r.querySelector('.item-qty').value),unitPrice:num(r.querySelector('.item-price').value)}));
  const inp=document.getElementById('ItemsJSON');if(inp)inp.value=JSON.stringify(items);
}

async function saveForm(e,entity,id){
  e.preventDefault();syncItems();
  const fd=new FormData(e.target),data={};
  (ENTITY_FIELDS[entity]||[]).forEach(f=>{
    const el=e.target.elements[f];if(!el)return;
    data[f]=el.type==='checkbox'?el.checked:el.value;
  });
  if(id)data.ID=id;
  setLoading(true);const r=await server('save',{token:STATE.token,entity,data});setLoading(false);
  if(!r.ok){toast(r.message,true);return}
  toast(r.message);closeModal();await refreshLookups();await loadEntity();
}

async function removeRecord(entity,id){
  if(!confirm('تأكيد حذف السجل؟'))return;
  setLoading(true);const r=await server('remove',{token:STATE.token,entity,id});setLoading(false);
  if(!r.ok){toast(r.message,true);return}toast(r.message);closeModal();await loadEntity();
}

async function approvePurchase(id){
  setLoading(true);const r=await server('approvePurchase',{token:STATE.token,id});setLoading(false);
  toast(r.message,!r.ok);if(r.ok)await loadEntity();
}

async function uploadAttachment(entity,recordId){
  const f=document.getElementById('attachmentFile').files[0];if(!f){toast('اختر ملفًا.',true);return}
  if(f.size>8*1024*1024){toast('الحد الأقصى 8MB.',true);return}
  const dataUrl=await readFile(f);setLoading(true);
  const r=await server('upload',{token:STATE.token,entity,recordId,name:f.name,mimeType:f.type,dataUrl});setLoading(false);
  toast(r.message,!r.ok);if(r.ok)window.open(r.fileUrl,'_blank');
}

function simpleTable(rows,headers){

function lookupOptions(entity,value){

function debouncedLoad(){clearTimeout(STATE.searchTimer);STATE.searchTimer=setTimeout(loadEntity,350)}
function closeModal(){document.getElementById('modal').classList.add('hidden');document.getElementById('modal').innerHTML=''}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function title(t,s=''){document.getElementById('pageTitle').textContent=t;document.getElementById('pageSubtitle').textContent=s}
function showLogin(){document.getElementById('loginView').classList.remove('hidden');document.getElementById('appView').classList.add('hidden')}
function showLoginError(m){const e=document.getElementById('loginError');e.textContent=m;e.classList.remove('hidden')}
function logout(){server('logout',{token:STATE.token});localStorage.removeItem('zf_erp_token');STATE.token='';location.reload()}
function setLoading(v){document.getElementById('loader').classList.toggle('hidden',!v)}
function toast(msg,bad=false){const d=document.createElement('div');d.className='toast'+(bad?' bad':'');d.textContent=msg||'تم';document.getElementById('toastWrap').appendChild(d);setTimeout(()=>d.remove(),3500)}
function server(action,payload){
  return new Promise(resolve=>{
    const url=String(CONFIG.GAS_WEB_APP_URL||'').trim();
    if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test(url)){
      resolve({ok:false,message:'رابط Apps Script غير صالح. يجب أن يبدأ بـ https://script.google.com/macros/s/ وينتهي بـ /exec'});
      return;
    }
    if(location.protocol==='file:'){
      resolve({ok:false,message:'لا تفتح index.html بالنقر المباشر. شغّله عبر GitHub Pages.'});
      return;
    }

    const requestId=(self.crypto&&crypto.randomUUID)
      ? crypto.randomUUID()
      : Date.now()+'_'+Math.random().toString(36).slice(2);
    const frameName='zf_api_'+requestId.replace(/[^a-zA-Z0-9_]/g,'');

    const iframe=document.createElement('iframe');
    iframe.name=frameName;
    iframe.id=frameName;
    iframe.hidden=true;
    iframe.setAttribute('aria-hidden','true');
    iframe.style.display='none';

    const form=document.createElement('form');
    form.method='POST';
    form.action=url;
    form.target=frameName;
    form.enctype='application/x-www-form-urlencoded';
    form.acceptCharset='UTF-8';
    form.style.display='none';

    const fields={
      requestId:requestId,
      action:String(action||''),
      payload:JSON.stringify(payload||{}),
      origin:location.origin
    };

    Object.entries(fields).forEach(([name,value])=>{
      const input=document.createElement('input');
      input.type='hidden';
      input.name=name;
      input.value=String(value);
      form.appendChild(input);
    });

    const cleanup=()=>{
      try{form.remove()}catch(_){}
      try{iframe.remove()}catch(_){}
    };

    const timer=setTimeout(()=>{
      if(!API_PENDING.has(requestId)) return;
      API_PENDING.delete(requestId);
      cleanup();
      resolve({
        ok:false,
        message:'لم تصل استجابة من Apps Script. افتح رابط /exec مباشرة: إن طلب تسجيل الدخول فأعد النشر باختيار Execute as me وWho has access: Anyone، ثم أنشئ إصدار نشر جديد.'
      });
    },CONFIG.REQUEST_TIMEOUT_MS);

    API_PENDING.set(requestId,{resolve,timer,cleanup});
    document.body.appendChild(iframe);
    document.body.appendChild(form);

    try{
      // تأخير بسيط يضمن أن iframe أصبح هدفاً صالحاً قبل إرسال النموذج.
      setTimeout(()=>{
        try{
          form.submit();
          setTimeout(()=>{ try{form.remove()}catch(_){} },250);
        }catch(err){
          clearTimeout(timer);
          API_PENDING.delete(requestId);
          cleanup();
          resolve({ok:false,message:'فشل إرسال الطلب إلى Apps Script: '+(err.message||String(err))});
        }
      },30);
    }catch(err){
      clearTimeout(timer);
      API_PENDING.delete(requestId);
      cleanup();
      resolve({ok:false,message:'فشل تجهيز الاتصال: '+(err.message||String(err))});
    }
  });
}
function val(id){return document.getElementById(id).value.trim()}
function fieldLabel(f){return FIELD_META[f]?.label||f}
function display(v,f){if(v===true)return'نعم';if(v===false)return'لا';if(v===null||v===undefined)return'';if(f==='ItemsJSON'){try{return JSON.parse(v).map(x=>x.name).join('، ')}catch(e){}}return String(v)}
function renderCell(v,f){const s=display(v,f);if(['Status','Type','CurrentStage'].includes(f))return`<span class="badge ${statusClass(s)}">${esc(statusText(s))}</span>`;if(typeof v==='number'||['Total','Balance','Paid','CurrentBalance','Salary','Amount','Debit','Credit'].includes(f))return esc(new Intl.NumberFormat('ar-DZ').format(num(v)));return esc(s)}
function statusText(s){return({ACTIVE:'جارية',PAUSED:'متوقفة',COMPLETED:'منتهية',PAID:'مدفوعة',PARTIAL:'جزئية',UNPAID:'غير مدفوعة',APPROVED:'معتمد',IN_APPROVAL:'قيد الاعتماد',REJECTED:'مرفوض',DRAFT:'مسودة',PENDING:'معلقة',RECEIVED:'مستلم',WORKING:'تعمل',MAINTENANCE:'صيانة',AVAILABLE:'متاحة',BRANCH_MANAGER:'مدير الفرع',FINANCE_MANAGER:'المدير المالي',GENERAL_MANAGER:'المدير العام',COMPLETED:'منتهية'})[s]||s}
function statusClass(s){s=String(s).toUpperCase();if(['PAID','APPROVED','ACTIVE','COMPLETED','RECEIVED','AVAILABLE'].includes(s))return'ok';if(['PENDING','PARTIAL','IN_APPROVAL','MAINTENANCE','DRAFT'].includes(s))return'warn';if(['REJECTED','OVERDUE','CANCELLED','OUT_OF_SERVICE'].includes(s))return'danger';return''}
function money(v,c='DZD'){return new Intl.NumberFormat('ar-DZ',{maximumFractionDigits:2}).format(num(v))+' '+c}
function num(v){const n=Number(String(v??0).replace(',','.'));return Number.isFinite(n)?n:0}
function dateInput(v,type){if(type!=='date'||!v)return v||'';return String(v).slice(0,10)}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
function readFile(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
window.addEventListener('unhandledrejection',e=>{
  console.error('UNHANDLED PROMISE:',e.reason);
  setLoading(false);
  if(!STATE.boot) showLoginError('خطأ غير متوقع: '+((e.reason&&e.reason.message)||e.reason||'Unknown error'));
});
window.addEventListener('error',e=>{
  console.error('WINDOW ERROR:',e.error||e.message);
  setLoading(false);
  if(!STATE.boot) showLoginError('خطأ في الواجهة: '+(e.message||'Unknown error'));
});
</script>
